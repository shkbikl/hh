name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build with full debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --info --stacktrace --debug 2>&1 | tee build.log || cat build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build.log