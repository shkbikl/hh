name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker
      run: sudo apt-get update && sudo apt-get install -y docker.io

    - name: Build with Gradle Docker
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          gradle:8.7-jdk17 \
          bash -c "
            apt-get update && apt-get install -y wget unzip android-sdk
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk/cmdline-tools
            mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest
            yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
            /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager 'platform-tools' 'platforms;android-34' 'build-tools;34.0.0'
            export ANDROID_HOME=/opt/android-sdk
            export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
            npm install
            npx cap add android
            npx cap sync android
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          "

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk